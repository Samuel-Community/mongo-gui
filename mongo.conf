upstream backendmongo {
    server 127.0.0.1:3000;
}

map $sent_http_content_type $charset {
    ~^text/ utf-8;
}

server {
    listen 80;
    listen [::]:80;

    server_name domaine.com;

    # Optimisation des timeouts pour les grosses requêtes DB
    client_max_body_size 0;
    proxy_read_timeout 6000;
    proxy_connect_timeout 6000;
    proxy_send_timeout 6000;
    proxy_request_buffering off;
    proxy_buffering off;

    charset $charset;
    charset_types *;

    error_log  /var/log/nginx/mongogui-error_log;
    access_log /var/log/nginx/mongogui-access.log;

    location / {
        # On essaie de servir des fichiers statiques s'ils existent, sinon proxy
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_pass http://backendmongo;

        # --- LA CORRECTION POUR LE REDIRECT LOCALHOST ---
        # Remplace l'adresse interne par ton domaine public dans les headers de redirection
        proxy_redirect http://127.0.0.1:3000/ http://domaine.com/;
        proxy_redirect http://localhost:3000/ http://domaine.com/;
        # ------------------------------------------------

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers essentiels pour que le middleware Next.js comprenne d'où vient la requête
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_hide_header X-Powered-By;

        proxy_cache_bypass $http_upgrade;
    }

    # Sécurité : Interdire l'accès aux fichiers sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.(sqlite|env|htaccess)$ {
        deny all;
    }
}