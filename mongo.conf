upstream backendmongo {
    server 127.0.0.1:4000;
}

limit_req_zone $binary_remote_addr zone=mongogui_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=mongogui_api:10m rate=120r/m;

server {
    listen 80;
    listen [::]:80;

    server_name domaine.com;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    client_max_body_size 20m;
    proxy_read_timeout 120;
    proxy_connect_timeout 10;
    proxy_send_timeout 120;
    proxy_request_buffering on;
    proxy_buffering on;

    charset utf-8;

    error_log  /var/log/nginx/mongogui-error.log;
    access_log /var/log/nginx/mongogui-access.log;

    proxy_hide_header X-Powered-By;

    location /api/auth/login {
        limit_req zone=mongogui_login burst=10 nodelay;
        proxy_pass http://backendmongo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        limit_req zone=mongogui_api burst=60 nodelay;
        proxy_pass http://backendmongo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://backendmongo;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.(sqlite|sqlite3|db|env|htaccess)$ {
        deny all;
    }
}
